name: Build and Deploy to EKS

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'microservices/**'
      - 'helm-chart/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: ms-eks
  PRODUCT_SERVICE_NAME: hello-service
  ORDER_SERVICE_NAME: client-service

jobs:
  build-product-service:
    name: Build Product Service
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./microservices/product-service
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./microservices/product-service
        run: |
          docker build -t $ECR_REGISTRY/$PRODUCT_SERVICE_NAME:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$PRODUCT_SERVICE_NAME:latest .
          docker push $ECR_REGISTRY/$PRODUCT_SERVICE_NAME:$IMAGE_TAG
          docker push $ECR_REGISTRY/$PRODUCT_SERVICE_NAME:latest
          echo "IMAGE=$ECR_REGISTRY/$PRODUCT_SERVICE_NAME:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Save image URI
        run: |
          echo "${{ steps.login-ecr.outputs.registry }}/${{ env.PRODUCT_SERVICE_NAME }}:${{ github.sha }}" > product-image.txt

      - name: Upload image URI artifact
        uses: actions/upload-artifact@v4
        with:
          name: product-image
          path: product-image.txt

  build-order-service:
    name: Build Order Service
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./microservices/order-service
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./microservices/order-service
        run: |
          docker build -t $ECR_REGISTRY/$ORDER_SERVICE_NAME:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ORDER_SERVICE_NAME:latest .
          docker push $ECR_REGISTRY/$ORDER_SERVICE_NAME:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ORDER_SERVICE_NAME:latest

      - name: Save image URI
        run: |
          echo "${{ steps.login-ecr.outputs.registry }}/${{ env.ORDER_SERVICE_NAME }}:${{ github.sha }}" > order-image.txt

      - name: Upload image URI artifact
        uses: actions/upload-artifact@v4
        with:
          name: order-image
          path: order-image.txt

  deploy-to-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build-product-service, build-order-service]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image URIs
        uses: actions/download-artifact@v4
        with:
          name: product-image

      - name: Download order image URI
        uses: actions/download-artifact@v4
        with:
          name: order-image

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kube config
        run: aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.13.0'

      - name: Deploy Product Service
        run: |
          PRODUCT_IMAGE=$(cat product-image.txt)
          helm upgrade --install hello ./helm-chart/springboot \
            --namespace default \
            --set image.repository=$(echo $PRODUCT_IMAGE | cut -d: -f1) \
            --set image.tag=${{ github.sha }} \
            --set service.name=hello \
            --set service.port=80 \
            --set env.CLIENT_SERVICE_URL=http://client.default.svc.cluster.local \
            --set ingress.enabled=true \
            --set ingress.className=alb \
            --set "ingress.hosts[0].paths[0].path=/hello" \
            --set "ingress.hosts[0].paths[0].pathType=Prefix" \
            --set "ingress.annotations.alb\.ingress\.kubernetes\.io/scheme=internet-facing" \
            --set "ingress.annotations.alb\.ingress\.kubernetes\.io/target-type=ip" \
            --set "ingress.annotations.alb\.ingress\.kubernetes\.io/healthcheck-path=/health" \
            --set "ingress.annotations.alb\.ingress\.kubernetes\.io/group\.name=microservices" \
            --set-string "ingress.annotations.alb\.ingress\.kubernetes\.io/group\.order=1" \
            --wait --timeout 10m

      - name: Deploy Order Service
        run: |
          ORDER_IMAGE=$(cat order-image.txt)
          helm upgrade --install client ./helm-chart/springboot \
            --namespace default \
            --set image.repository=$(echo $ORDER_IMAGE | cut -d: -f1) \
            --set image.tag=${{ github.sha }} \
            --set service.name=client \
            --set service.port=80 \
            --set env.HELLO_SERVICE_URL=http://hello.default.svc.cluster.local \
            --set ingress.enabled=true \
            --set ingress.className=alb \
            --set "ingress.hosts[0].paths[0].path=/" \
            --set "ingress.hosts[0].paths[0].pathType=Prefix" \
            --set "ingress.annotations.alb\.ingress\.kubernetes\.io/scheme=internet-facing" \
            --set "ingress.annotations.alb\.ingress\.kubernetes\.io/target-type=ip" \
            --set "ingress.annotations.alb\.ingress\.kubernetes\.io/healthcheck-path=/health" \
            --set "ingress.annotations.alb\.ingress\.kubernetes\.io/group\.name=microservices" \
            --set-string "ingress.annotations.alb\.ingress\.kubernetes\.io/group\.order=10" \
            --wait --timeout 10m

      - name: Get deployment status
        run: |
          echo "=== Pods ==="
          kubectl get pods -n default
          echo "=== Services ==="
          kubectl get svc -n default
          echo "=== Ingress ==="
          kubectl get ingress -n default
          echo "=== Load Balancer URL ==="
          kubectl get ingress -n default -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}'
